name: Deploy PhishGuard to Droplet

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 188.166.227.65
          username: root
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            cd /var/www/html/mahmud/phishguard
            git pull origin main
            npm install
            npm run build
            pm2 restart phishguard